# Nginx configuration for PMO Dashboard
# Place this file at: /etc/nginx/sites-available/pmo-dashboard
# Then create symlink: sudo ln -s /etc/nginx/sites-available/pmo-dashboard /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;  # Replace with your domain or EC2 public IP
    
    # Maximum upload size for Excel files
    client_max_body_size 50M;
    
    # Logging
    access_log /var/log/nginx/pmo-dashboard-access.log;
    error_log /var/log/nginx/pmo-dashboard-error.log;

    # Proxy to Node.js application
    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Cache bypass
        proxy_cache_bypass $http_upgrade;
    }
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

